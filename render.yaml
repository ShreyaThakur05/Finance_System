services:
  - type: web
    name: finance-tracker-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && alembic upgrade head && python seed.py && python seed.py
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:///./finance.db
      - key: PYTHON_VERSION
        value: 3.11.0
