version: "3.9"

services:
  backend:
    build: ./backend
    container_name: finance_backend
    ports:
      - "8000:8000"
    volumes:
      - db_data:/app/data
    environment:
      - DATABASE_URL=sqlite:////app/data/finance.db
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: finance_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db_data:
